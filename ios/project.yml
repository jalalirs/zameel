name: Zameel
options:
  bundleIdPrefix: com.jalalirs
  deploymentTarget:
    iOS: "17.0"
targets:
  Zameel:
    type: application
    platform: iOS
    sources: [Zameel]
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: B35AK98DRA
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "4"
    scheme:
      testTargets: [ZameelUITests]
    info:
      path: Zameel/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: Zameel
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        # Plain HTTP to the private Tailscale backend only; no custom crypto,
        # so skip the export-compliance questionnaire on every upload.
        ITSAppUsesNonExemptEncryption: false
        NSAppTransportSecurity:
          # Backend lives on the private Tailscale network over plain HTTP.
          NSAllowsArbitraryLoads: true
        NSPhotoLibraryUsageDescription: >-
          Zameel matches photos you took during the trip to attractions by
          their location, and uploads the ones you choose.
  ZameelUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [ZameelUITests]
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Zameel
